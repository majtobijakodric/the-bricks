<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="src/assets/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/style.css">
  <title>The Bricks</title>
</head>

<body>
  <div id="app" class="min-h-screen px-4 py-6">
    <div class="mx-auto flex w-fit flex-col items-center gap-4">
      <div class="w-full rounded-xl border border-slate-700/80 bg-slate-950/70 p-4 shadow-xl">
        <div class="flex items-center justify-between gap-4">
          <div id="livesText" class="flex items-center gap-1" aria-label="Lives"></div>

          <div class="flex flex-wrap items-center justify-end gap-2">
            <p id="scoreText"
              class="rounded-md border border-slate-700 bg-slate-900 px-3 py-1.5 text-sm font-medium text-white shadow">
              Score: 0
            </p>

            <p id="modeText"
              class="rounded-md border border-slate-700 bg-slate-900 px-3 py-1.5 text-sm font-medium text-white shadow">
              Mode: Medium
            </p>

            <button id="pauseButton" type="button"
              class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-white shadow">
            </button>

            <!-- <button id="ballSpeedButton" type="button"
              class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-white shadow">
              Ball speed
            </button>

            <button id="padSpeedButton" type="button"
              class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-white shadow">
              Pad speed
            </button> -->

            <button id="aboutButton" type="button"
              class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-white shadow">
            </button>

            <button id="muteButton" type="button"
              class="rounded-md bg-slate-800 px-3 py-1.5 text-sm font-medium text-white shadow">
            </button>
          </div>
        </div>
      </div>

      <canvas id="gameCanvas" width="800" height="600"
        class="block rounded-lg border border-slate-700 shadow-2xl"></canvas>
    </div>
  </div>
  <script type="module" src="./src/ts/main.ts"></script>
</body>

</html>
